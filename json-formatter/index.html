<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPBasic JSON Workbench</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h2>SPBasic JSON Workbench</h2>
</header>

<div class="toolbar">
    <input type="file" id="fileInput">

    <button onclick="formatJSON()">Format</button>
    <button onclick="minifyJSON()">Minify</button>
    <button onclick="validateJSON()">Validate</button>
    <button onclick="runAutoFix('safe')">Safe Fix</button>
    <button onclick="runAutoFix('smart')">Smart Fix</button>
    <button onclick="runAutoFix('aggressive')">Aggressive Fix</button>
    <button onclick="downloadJSON()">Download</button>
    <button onclick="newJSON()">New</button>

    <input id="search" placeholder="Search..." onkeyup="searchJSON()">
</div>

<div class="container">

    <textarea id="input"></textarea>

    <pre id="output"></pre>

</div>

<div class="bottom">

    <div id="status"></div>
    <div id="stats"></div>

</div>

<div class="tree">
    <h3>Tree View</h3>
    <div id="tree"></div>
</div>

<script src="js/parser.js"></script>
<script src="js/fixer.js"></script>
<script src="js/tree.js"></script>
<script src="js/analyzer.js"></script>
<script src="js/file.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>

</body>
</html>
