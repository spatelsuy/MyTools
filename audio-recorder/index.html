<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="responseStyle.css">
<link rel="stylesheet" href="mainStyle.css">

<title>Voice Recorder</title>

</head>

<body>

<div class="app-wrapper">
    <!-- Recorder Interface -->
    <div class="container">
        <h3>Voice Recorder</h3>
        <canvas id="waveCanvas"></canvas>
        <div id="status">Ready</div>
		<div class="controls">
    		<button id="startBtn"><span>Start</span></button>
    		<button id="pauseBtn" disabled><span>Pause</span></button>
    		<button id="stopBtn" disabled><span>Stop</span></button>
		</div>		
    </div>

    <!-- Storage / Logs Section -->
    <div class="history-container">
        <h4>History</h4>
        <div id="history"></div>	
    </div>
   <button id="a2t">A2T</button>
</div>
<div id="response">-</div>
<script>
/* =========================
   GLOBAL STATE
========================= */
let mediaRecorder;
let audioChunks = [];
let stream;

let audioContext;
let analyser;
let dataArray;
let source;

let recordingIndex = 0;
let startTime;
let timerInterval = null;
let seconds = 0;
let isPaused = false;
let estimatedBitrate = 50 * 1024; 

let liveSize = 0;
let uiInterval;
let recordings = [];

/* =========================
   UI ELEMENTS
========================= */
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const status = document.getElementById("status");
const history = document.getElementById("history");

const a2t = document.getElementById("a2t");

startBtn.onclick = startRecording;
pauseBtn.onclick = togglePause;
stopBtn.onclick = stopRecording;
a2t.onclick = transcribe;

/* =========================
   BOOT — restore from IndexedDB
========================= */
const DB_NAME = "VoiceRecorderDB";
const DB_VERSION = 1;
const STORE_NAME = "recordings";
let db = null;
	
async function boot() {
  try {
    db = await openDB();
    const saved = await dbLoadAllRecordings();

    // Sort oldest-first so indices/names are preserved
    saved.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

    recordings = saved.map(entry => ({
      id:        entry.id,
      name:      entry.name,
      blob:      entry.blob,
      url:       URL.createObjectURL(entry.blob),   // fresh ObjectURL each session
      size:      entry.size,
      duration:  entry.duration,
      createdAt: new Date(entry.createdAt)
    }));

    recordingIndex = recordings.length;
    renderHistory();
  } catch (err) {
    console.error("IndexedDB boot failed — recordings won't persist:", err);
    renderHistory();
  }
}

boot();

	
/* =========================
   INDEXEDDB PERSISTENCE
   Recordings are stored as blobs in IndexedDB so they survive
   page refreshes, tab switches, and mobile screen locks.
========================= */

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(STORE_NAME)) {
        database.createObjectStore(STORE_NAME, { keyPath: "id" });
      }
    };

    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror  = (e) => reject(e.target.error);
  });
}


function dbSaveRecording(rec) {
  return new Promise((resolve, reject) => {
    // Store plain-serialisable copy (blob + metadata, no ObjectURL)
    const entry = {
      id:        rec.id,
      name:      rec.name,
      blob:      rec.blob,
      size:      rec.size,
      duration:  rec.duration,
      createdAt: rec.createdAt.toISOString()
    };
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(entry);
    tx.oncomplete = resolve;
    tx.onerror    = (e) => reject(e.target.error);
  });
}

function dbDeleteRecording(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = resolve;
    tx.onerror    = (e) => reject(e.target.error);
  });
}

function dbLoadAllRecordings() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror   = (e) => reject(e.target.error);
  });
}


	
/* =========================
   Use GenAI
========================= */	

async function transcribe(){
  const apiUrl = "https://decode-cri.vercel.app/a2t/transcribe";
  // 1. Create a FormData container
  const formData = new FormData();
  
  // 2. Append the normal string data
  formData.append("user_name", "SunilK");
  
  // 3. Append the raw audio recording (and give it a filename extension)
  formData.append("file", recordings[0].blob, "recording.webm");

  try {
    // 4. Send the request without setting a "Content-Type" header manually!
    const response = await fetch(apiUrl, {
      method: "POST",
      body: formData // The browser handles headers automatically here
    });

    if (!response.ok) {
      throw new Error(`Server responded with status ${response.status}`);
    }
    const data = await response.json();
	DisplayResponse(data);
    console.log("Transcribed text received:", data);
    return data;

  } catch (error) {
	alert(error);
    console.error("Error uploading audio:", error);
  }
}
	

   
/* =========================
   CREATE RECORDER
========================= */
function createRecorder(stream) {
	const mimeType = 'audio/webm; codecs=opus'; 
	const options = {
		mimeType: mimeType,
		audioBitsPerSecond: 24000 // 24 kbps is highly compressed but clear for voice
	};
    const recorder = new MediaRecorder(stream, options);

    recorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            audioChunks.push(e.data);
            liveSize += e.data.size;
        }
    };

    recorder.onstop = saveRecording;
    return recorder;
}

/* =========================
   START
========================= */
async function startRecording() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
  			audio: {
    			noiseSuppression: true,  // Strips out background hums/hiss
    			echoCancellation: true,  // Prevents echo and feedback
    			autoGainControl: true    // Keeps your voice volume steady
  			} 
		});
        audioChunks = [];
        liveSize = 0;
        startTime = Date.now();

        setupWaveform(stream);

        mediaRecorder = createRecorder(stream);
        mediaRecorder.start();
        startTimer();
        uiInterval = setInterval(updateUI, 300);

        startBtn.disabled = true;
        pauseBtn.disabled = false;
        stopBtn.disabled = false;
    } catch (err) {
        status.innerText = "Microphone access denied";
        console.error(err);
    }
}

/* =========================
   PAUSE / RESUME
========================= */
function togglePause() {
    if (mediaRecorder.state === "recording") {
        mediaRecorder.pause();
        pauseTimer();
        pauseBtn.innerText = "Resume";
        status.innerText = `⏸ Paused • ${formatDuration(seconds)}`;
    } else if (mediaRecorder.state === "paused") {
        mediaRecorder.resume();
        resumeTimer();
        pauseBtn.innerText = "Pause";
    }
}

/* =========================
   STOP
========================= */
function stopRecording() {
    mediaRecorder.stop();
    stopTimer();
    clearInterval(uiInterval);

    startBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    pauseBtn.innerText = "Pause";

    status.innerText = "Processing...";
}

/* =========================
   SAVE
========================= */
async function saveRecording() {
    const blob = new Blob(audioChunks, { type: "audio/webm" });
    const url = URL.createObjectURL(blob);
    const duration = seconds;

    const rec = {
        name: "Recording " + (recordingIndex + 1),
        id: Date.now(),
        blob,
        url,
        size: blob.size,
        duration,
        createdAt: new Date()
    };
    recordingIndex = recordingIndex + 1;
    recordings.push(rec);
	// Persist to IndexedDB — won't be lost on refresh or screen lock
	if (db) {
		try {
			await dbSaveRecording(rec);
		} catch (err) {
			console.error("Failed to save recording to IndexedDB:", err);
		}
	}	
    renderHistory();

    stream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();

    status.innerText = "Saved Successfully ✓";
}

/* =========================
   LIVE UI UPDATE
========================= */
function updateUI() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
        status.innerText = `🔴 Recording... ${formatDuration(seconds)}`;
    }
    drawWaveform();
}

/* =========================
   WAVEFORM
========================= */
function setupWaveform(stream) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function drawWaveform() {
    if (!analyser) return;

    analyser.getByteTimeDomainData(dataArray);

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    ctx.fillStyle = "#f1f5f9";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#334155";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    ctx.beginPath();

    let sliceWidth = canvas.width / dataArray.length;
    let x = 0;

    for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = (v * canvas.height) / 2;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        x += sliceWidth;
    }

    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
}

/* =========================
   HISTORY RENDERING
========================= */
function renderHistory() {
    history.innerHTML = "";

    if(recordings.length === 0) {
        history.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0;">No recordings saved yet.</div>`;
        return;
    }

    recordings.forEach((r) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="card-title">${r.name}</div>
            <div class="meta">
                ${formatSize(r.size)} • ${formatDuration(r.duration)} • ${r.createdAt.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
            </div>
            <audio controls src="${r.url}"></audio>
            <div class="card-actions">
                <button class="btn-download" onclick="downloadFile('${r.url}','webm')">Download WEBM</button>
                <button class="btn-delete" onclick="deleteRec(${r.id})">Delete</button>
            </div>
        `;
        history.appendChild(div);
    });
}

/* =========================
   DOWNLOAD & DELETE
========================= */
function downloadFile(url, ext) {
    const a = document.createElement("a");
    a.href = url;
    a.download = `recording.${ext}`;
    a.click();
}

async function deleteRec(id) {
    const i = recordings.findIndex(r => r.id === id);
    if (i !== -1) {
        URL.revokeObjectURL(recordings[i].url);
        recordings.splice(i, 1);

		// Remove from IndexedDB so it stays gone after next reload
		if (db) {
		  try {
			await dbDeleteRecording(id);
		  } catch (err) {
			console.error("Failed to delete recording from IndexedDB:", err);
		  }
		}		
		
        renderHistory();
    }
}

/* =========================
   HELPERS
========================= */
function formatSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function formatDuration(sec) {
    let min = Math.floor(sec / 60);
    sec = sec % 60;
    return `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function startTimer() {
    seconds = 0;
    isPaused = false;
    timerInterval = setInterval(() => {
        if (!isPaused) {
            seconds++;
        }
    }, 1000);
}

function pauseTimer() { isPaused = true; }
function resumeTimer() { isPaused = false; }
function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

// Initial empty state call
renderHistory();
</script>

<script>
const SECTION_CONFIG = {
  tasks:     { label: "Tasks",     icon: "✅", theme: "theme-tasks" },
  events:    { label: "Events",    icon: "📅", theme: "theme-events" },
  reminders: { label: "Reminders", icon: "🔔", theme: "theme-reminders" },
  notes:     { label: "Notes",     icon: "📝", theme: "theme-notes" }
};

function priorityClass(p) {
  return p === "high" ? "priority-high" : p === "medium" ? "priority-medium" : "priority-low";
}

function renderItem(item) {
  const tags = [];
  if (item.time)       tags.push(`<span class="tag tag-time">🕐 ${item.time}</span>`);
  if (item.is_deadline) tags.push(`<span class="tag tag-deadline">⚑ Deadline</span>`);
  if (item.related_to) tags.push(`<span class="tag tag-related">↗ ${item.related_to}</span>`);
  if (item.context)    tags.push(`<span class="tag tag-context">${item.context}</span>`);

  return `
    <div class="item">
      <div class="item-top">
        <div class="item-title">${item.title}</div>
        <div class="priority-dot ${priorityClass(item.priority)}"
             title="Priority: ${item.priority}"></div>
      </div>
      ${tags.length ? `<div class="item-meta">${tags.join("")}</div>` : ""}
    </div>`;
}

function renderSection(key, items) {
  const cfg = SECTION_CONFIG[key];
  const body = items.length === 0
    ? `<div class="empty">Nothing here</div>`
    : `<div class="items-list">${items.map(renderItem).join("")}</div>`;

  return `
    <div class="section-card ${cfg.theme}">
      <div class="section-header">
        <div class="section-icon">${cfg.icon}</div>
        <div class="section-title">${cfg.label}</div>
        <div class="section-count">${items.length}</div>
      </div>
      ${body}
    </div>`;
}

function DisplayResponse(jsonResp) {
  const container = document.getElementById("response");
  const a = jsonResp.analysis;

  // Format extracted date
  let dateStr = "";
  if (a.extracted_on) {
    const d = new Date(a.extracted_on);
    dateStr = d.toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
  }

  // Count total items
  const total = ["tasks","events","reminders","notes"]
    .reduce((sum, k) => sum + (a[k]||[]).length, 0);

  // Build sections HTML
  const sectionsHTML = ["tasks","events","reminders","notes"]
    .map(k => renderSection(k, a[k] || []))
    .join("");

  container.innerHTML = `
    <div class="planner-header">
      <h2>My Day Planner</h2>
      <div class="sub">${dateStr}</div>
    </div>

    <div class="transcription-card">
      <div class="card-label">📝 Original Transcript</div>
      <p>${jsonResp.transcription || "—"}</p>
    </div>

    <div class="sections-grid">${sectionsHTML}</div>

    <div class="meta-bar">
      <div class="status-dot"></div>
      ${total} items extracted &middot; User: ${jsonResp.user || "—"} &middot; Status: ${jsonResp.status}
    </div>
  `;
}
</script>
	
</body>
</html>
