<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Recorder</title>

<style>
/* =========================
   RESPONSIVE LAYOUT FIX
========================= */

body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}

/* Desktop: 80% width */
.container {
    width: 60%;
    margin: 20px 0;
}

/* Mobile: 100% with margin */
@media (max-width: 768px) {
    .container {
        width: 95%;
    }
}

h2 {
    text-align: center;
}

.controls {
    display: flex;
    justify-content: space-around;
    margin: 15px 0;
}

button {
    flex: 1;
    margin: 3px;
    padding: 8px;
    font-size: 12px;
    border: none;
    border-radius: 4px;
}

#startBtn { background: #4CAF50; color: white; }
#pauseBtn { background: #ff9800; color: white; }
#stopBtn  { background: #f44336; color: white; }

#status {
    text-align: center;
    margin: 10px 0;
    font-weight: bold;
}

canvas {
    width: 100%;
    height: 120px;
    background: black;
    border-radius: 10px;
}

.card {
    background: white;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
}

.meta {
    font-size: 10px;
    color: #444;
}

audio {
    width: 100%;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
	<h3 style="text-align: center;">🎤 Voice Recorder</h3>
	<canvas id="waveCanvas"></canvas>
	<div id="status">Ready</div>
	<div class="controls">
    	<button id="startBtn">Start</button>
    	<button id="pauseBtn" disabled>Pause</button>
    	<button id="stopBtn" disabled>Stop</button>
	</div>
</div>
<h4 style="text-align: center;">History</h4>
<div id="history"></div>

<script>

/* =========================
   GLOBAL STATE
========================= */

let mediaRecorder;
let audioChunks = [];
let stream;

let audioContext;
let analyser;
let dataArray;
let source;

let recordingIndex = 0;
let startTime;
let timerInterval = null;
let seconds = 0;
let isPaused = false;
let estimatedBitrate = 50 * 1024; //50 KB /s convered to bytes


let liveSize = 0;
let uiInterval;

let recordings = [];

/* =========================
   UI ELEMENTS
========================= */

const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const status = document.getElementById("status");
const history = document.getElementById("history");

startBtn.onclick = startRecording;
pauseBtn.onclick = togglePause;
stopBtn.onclick = stopRecording;

/* =========================
   CREATE RECORDER (FIX #2)
========================= */

function createRecorder(stream) {

    const recorder = new MediaRecorder(stream);

    recorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            audioChunks.push(e.data);
            // FIX #3: no need for reduce()
            liveSize += e.data.size;
        }
    };

    recorder.onstop = saveRecording;
    return recorder;
}

/* =========================
   START
========================= */

async function startRecording() {

    stream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });

    audioChunks = [];
    liveSize = 0;

    startTime = Date.now();

    setupWaveform(stream);

    mediaRecorder = createRecorder(stream);
    mediaRecorder.start();
	startTimer();
    uiInterval = setInterval(updateUI, 300);

    startBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
}

/* =========================
   PAUSE / RESUME
========================= */

function togglePause() {

    if (mediaRecorder.state === "recording") {

        mediaRecorder.pause();
		pauseTimer();
        pauseBtn.innerText = "Resume";

    } else if (mediaRecorder.state === "paused") {
        mediaRecorder.resume();
		resumeTimer();
        pauseBtn.innerText = "Pause";
    }
}

/* =========================
   STOP
========================= */

function stopRecording() {

    mediaRecorder.stop();
	stopTimer();
    clearInterval(uiInterval);

    startBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    pauseBtn.innerText = "Pause";

    status.innerText = "Processing...";
}

/* =========================
   SAVE
========================= */

function saveRecording() {

    const blob = new Blob(audioChunks, {
        type: "audio/webm"
    });

    const url = URL.createObjectURL(blob);

    const duration = seconds;

    const rec = {
		name: "Recording " + (recordingIndex + 1),
        id: Date.now(),
        blob,
        url,
        size: blob.size,
        duration,
        createdAt: new Date()
    };
	recordingIndex = recordingIndex + 1;

    recordings.push(rec);

    renderHistory();

    stream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();

    status.innerText = "Saved ✔";
}

/* =========================
   LIVE UI UPDATE (FIX #3)
========================= */

function updateUI() {

    status.innerText =`🔴 Recording... ${formatDuration(seconds)}`;

    drawWaveform();
}

/* =========================
   WAVEFORM
========================= */

function setupWaveform(stream) {

    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();

    source = audioContext.createMediaStreamSource(stream);

    source.connect(analyser);

    analyser.fftSize = 256;

    dataArray =
        new Uint8Array(analyser.frequencyBinCount);
}

function drawWaveform() {

    if (!analyser) return;

    analyser.getByteTimeDomainData(dataArray);

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#00ff88";
    ctx.lineWidth = 2;

    ctx.beginPath();

    let sliceWidth = canvas.width / dataArray.length;
    let x = 0;

    for (let i = 0; i < dataArray.length; i++) {

        let v = dataArray[i] / 128.0;
        let y = v * canvas.height / 2;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        x += sliceWidth;
    }

    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
}

/* =========================
   HISTORY
========================= */

function renderHistory() {

    history.innerHTML = "";

    recordings.forEach((r) => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${r.name}</b><br>

            <div class="meta">
                Size: ${formatSize(r.size)} | Duration: ${formatDuration(r.duration)} | Created: ${r.createdAt.toLocaleString()}
            </div>

            <audio controls src="${r.url}"></audio>

            <button onclick="downloadFile('${r.url}','webm')">WEBM</button>
            <button onclick="deleteRec(${r.id})">Delete</button>
        `;

        history.appendChild(div);
    });
}

/* =========================
   DOWNLOAD
========================= */

function downloadFile(url, ext) {

    const a = document.createElement("a");
    a.href = url;
    a.download = `recording.${ext}`;
    a.click();
}

/* =========================
   DELETE
========================= */

function deleteRec(id) {

    const i = recordings.findIndex(r => r.id === id);

    if (i !== -1) {

        URL.revokeObjectURL(recordings[i].url);
        recordings.splice(i, 1);

        renderHistory();
    }
}

/* =========================
   HELPERS
========================= */

function formatSize(bytes) {

    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024)
        return (bytes / 1024).toFixed(1) + " KB";

    return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function formatDuration(sec) {

    let min = Math.floor(sec / 60);
    sec = sec % 60;

    return `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}
function startTimer() {

    seconds = 0;
    isPaused = false;

    timerInterval = setInterval(() => {

        if (!isPaused) {
            seconds++;
        }

    }, 1000);
}

function pauseTimer() {
    isPaused = true;
}
function resumeTimer() {
    isPaused = false;
}
function stopTimer() {

    clearInterval(timerInterval);
    timerInterval = null;
}

</script>

</body>
</html>
