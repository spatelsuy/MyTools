<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Recorder</title>

<style>
/* =========================
   MODERN LIGHT PROFESSIONAL UI
========================= */

:root {
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --primary: #0284c7;
    --primary-hover: #0369a1;
    --success: #16a34a;
    --success-hover: #15803d;
    --warning: #ea580c;
    --warning-hover: #c2410c;
    --danger: #dc2626;
    --danger-hover: #b91c1c;
    --border: #e2e8f0;
}

* {
    box-sizing: border-box;
}


body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: var(--bg-color);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
}

/* Unified Main Wrapper */
.app-wrapper {
    width: 100%;
    max-width: 500px; /* Snug width looks sharper */
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.container, .history-container {
    width: 100%; /* Force standard expansion within the layout wrapper */
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
}

h3, h4 {
    margin-top: 0;
    margin-bottom: 20px;
    font-weight: 600;
    letter-spacing: -0.025em;
}

h3 { font-size: 22px; text-align: center; color: var(--text-main); }
h4 { font-size: 16px; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

/* Status Text */
#status {
    text-align: center;
    margin: 16px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

/* Visualization Canvas */
canvas {
    width: 100%;
    height: 100px;
    background: #f1f5f9;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: block;
}

/* Controls Alignment */
.controls {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

/* Modern Button Base Styling */
button {
    flex: 1;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    justify-content: center;
    align-items: center;
}

button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
}

/* Dynamic Action Buttons */
#startBtn { background: var(--success); color: white; }
#startBtn:hover { background: var(--success-hover); }

#pauseBtn { background: var(--warning); color: white; }
#pauseBtn:hover { background: var(--warning-hover); }

#stopBtn  { background: var(--danger); color: white; }
#stopBtn:hover { background: var(--danger-hover); }

/* History Cards */
#history {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.card {
    background: #f8fafc;
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 12px;
}

.card-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
    color: var(--text-main);
}

.meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
}

/* Native Audio Player Styling overrides */
audio {
    width: 100%;
    margin-bottom: 12px;
    border-radius: 8px;
}

/* History Card Action Layout */
.card-actions {
    display: flex;
    gap: 8px;
}

.card-actions button {
    padding: 8px 12px;
    font-size: 12px;
}

.btn-download { background: var(--primary); color: white; }
.btn-download:hover { background: var(--primary-hover); }

.btn-delete { background: transparent; border: 1px solid #cbd5e1; color: var(--danger); }
.btn-delete:hover { background: #fee2e2; border-color: var(--danger); }

</style>
</head>

<body>

<div class="app-wrapper">
    <!-- Recorder Interface -->
    <div class="container">
        <h3>Voice Recorder</h3>
        <canvas id="waveCanvas"></canvas>
        <div id="status">Ready</div>
        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn" disabled>Pause</button>
            <button id="stopBtn" disabled>Stop</button>
        </div>
    </div>

    <!-- Storage / Logs Section -->
    <div class="history-container">
        <h4>History</h4>
        <div id="history"></div>	
    </div>
   <button id="a2t">A2T</button>
</div>

<script>
/* =========================
   GLOBAL STATE
========================= */
let mediaRecorder;
let audioChunks = [];
let stream;

let audioContext;
let analyser;
let dataArray;
let source;

let recordingIndex = 0;
let startTime;
let timerInterval = null;
let seconds = 0;
let isPaused = false;
let estimatedBitrate = 50 * 1024; 

let liveSize = 0;
let uiInterval;
let recordings = [];

/* =========================
   UI ELEMENTS
========================= */
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const status = document.getElementById("status");
const history = document.getElementById("history");

const a2t = document.getElementById("a2t");

startBtn.onclick = startRecording;
pauseBtn.onclick = togglePause;
stopBtn.onclick = stopRecording;
a2t.onclick = transcribe;


async function transcribe(){
  const apiUrl = "https://decode-cri.vercel.app/a2t/transcribe";
  // 1. Create a FormData container
  const formData = new FormData();
  
  // 2. Append the normal string data
  formData.append("user_name", "SunilK");
  
  // 3. Append the raw audio recording (and give it a filename extension)
  formData.append("file", recordings[0].blob, "recording.webm");

  try {
    // 4. Send the request without setting a "Content-Type" header manually!
    const response = await fetch(apiUrl, {
      method: "POST",
      body: formData // The browser handles headers automatically here
    });

    if (!response.ok) {
      throw new Error(`Server responded with status ${response.status}`);
    }
    const data = await response.json();
	alert(JSON.stringify(data));
	alert(data.text);
    console.log("Transcribed text received:", data);
    return data;

  } catch (error) {
	alert(error);
    console.error("Error uploading audio:", error);
  }
}
	

   
/* =========================
   CREATE RECORDER
========================= */
function createRecorder(stream) {
    const recorder = new MediaRecorder(stream);

    recorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            audioChunks.push(e.data);
            liveSize += e.data.size;
        }
    };

    recorder.onstop = saveRecording;
    return recorder;
}

/* =========================
   START
========================= */
async function startRecording() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
  			audio: {
    			noiseSuppression: true,  // Strips out background hums/hiss
    			echoCancellation: true,  // Prevents echo and feedback
    			autoGainControl: true    // Keeps your voice volume steady
  			} 
		});
        audioChunks = [];
        liveSize = 0;
        startTime = Date.now();

        setupWaveform(stream);

        mediaRecorder = createRecorder(stream);
        mediaRecorder.start();
        startTimer();
        uiInterval = setInterval(updateUI, 300);

        startBtn.disabled = true;
        pauseBtn.disabled = false;
        stopBtn.disabled = false;
    } catch (err) {
        status.innerText = "Microphone access denied";
        console.error(err);
    }
}

/* =========================
   PAUSE / RESUME
========================= */
function togglePause() {
    if (mediaRecorder.state === "recording") {
        mediaRecorder.pause();
        pauseTimer();
        pauseBtn.innerText = "Resume";
        status.innerText = `⏸ Paused • ${formatDuration(seconds)}`;
    } else if (mediaRecorder.state === "paused") {
        mediaRecorder.resume();
        resumeTimer();
        pauseBtn.innerText = "Pause";
    }
}

/* =========================
   STOP
========================= */
function stopRecording() {
    mediaRecorder.stop();
    stopTimer();
    clearInterval(uiInterval);

    startBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    pauseBtn.innerText = "Pause";

    status.innerText = "Processing...";
}

/* =========================
   SAVE
========================= */
function saveRecording() {
    const blob = new Blob(audioChunks, { type: "audio/webm" });
    const url = URL.createObjectURL(blob);
    const duration = seconds;

    const rec = {
        name: "Recording " + (recordingIndex + 1),
        id: Date.now(),
        blob,
        url,
        size: blob.size,
        duration,
        createdAt: new Date()
    };
    recordingIndex = recordingIndex + 1;
    recordings.push(rec);

    renderHistory();

    stream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();

    status.innerText = "Saved Successfully ✓";
}

/* =========================
   LIVE UI UPDATE
========================= */
function updateUI() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
        status.innerText = `🔴 Recording... ${formatDuration(seconds)}`;
    }
    drawWaveform();
}

/* =========================
   WAVEFORM
========================= */
function setupWaveform(stream) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function drawWaveform() {
    if (!analyser) return;

    analyser.getByteTimeDomainData(dataArray);

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    ctx.fillStyle = "#f1f5f9";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#334155";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    ctx.beginPath();

    let sliceWidth = canvas.width / dataArray.length;
    let x = 0;

    for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = (v * canvas.height) / 2;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        x += sliceWidth;
    }

    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
}

/* =========================
   HISTORY RENDERING
========================= */
function renderHistory() {
    history.innerHTML = "";

    if(recordings.length === 0) {
        history.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0;">No recordings saved yet.</div>`;
        return;
    }

    recordings.forEach((r) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="card-title">${r.name}</div>
            <div class="meta">
                ${formatSize(r.size)} • ${formatDuration(r.duration)} • ${r.createdAt.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
            </div>
            <audio controls src="${r.url}"></audio>
            <div class="card-actions">
                <button class="btn-download" onclick="downloadFile('${r.url}','webm')">Download WEBM</button>
                <button class="btn-delete" onclick="deleteRec(${r.id})">Delete</button>
            </div>
        `;
        history.appendChild(div);
    });
}

/* =========================
   DOWNLOAD & DELETE
========================= */
function downloadFile(url, ext) {
    const a = document.createElement("a");
    a.href = url;
    a.download = `recording.${ext}`;
    a.click();
}

function deleteRec(id) {
    const i = recordings.findIndex(r => r.id === id);
    if (i !== -1) {
        URL.revokeObjectURL(recordings[i].url);
        recordings.splice(i, 1);
        renderHistory();
    }
}

/* =========================
   HELPERS
========================= */
function formatSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function formatDuration(sec) {
    let min = Math.floor(sec / 60);
    sec = sec % 60;
    return `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function startTimer() {
    seconds = 0;
    isPaused = false;
    timerInterval = setInterval(() => {
        if (!isPaused) {
            seconds++;
        }
    }, 1000);
}

function pauseTimer() { isPaused = true; }
function resumeTimer() { isPaused = false; }
function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

// Initial empty state call
renderHistory();
</script>

</body>
</html>
